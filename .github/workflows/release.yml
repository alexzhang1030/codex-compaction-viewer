name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: cxv-linux-x86_64.tar.gz
            rust_target: ""
            build_args: ""
            bin_path: target/release/cxv
          - os: macos-14
            asset: cxv-macos-x86_64.tar.gz
            rust_target: x86_64-apple-darwin
            build_args: "--target x86_64-apple-darwin"
            bin_path: target/x86_64-apple-darwin/release/cxv
          - os: macos-14
            asset: cxv-macos-aarch64.tar.gz
            rust_target: ""
            build_args: ""
            bin_path: target/release/cxv
          - os: windows-latest
            asset: cxv-windows-x86_64.zip
            rust_target: ""
            build_args: ""

    steps:
      - uses: actions/checkout@v4
      - run: cargo test
      - name: Add cross target
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}
      - run: cargo build --release ${{ matrix.build_args }}
      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          tar -czf "dist/${{ matrix.asset }}" -C "$(dirname "${{ matrix.bin_path }}")" "$(basename "${{ matrix.bin_path }}")"
      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Compress-Archive -Path target/release/cxv.exe -DestinationPath "dist/${{ matrix.asset }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

  release:
    name: publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --repo "$GITHUB_REPOSITORY" --generate-notes
